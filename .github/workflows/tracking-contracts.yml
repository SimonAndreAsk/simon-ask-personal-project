name: Tracking contracts

on:
  pull_request:
  push:
    branches: [main, master, staging]

permissions:
  contents: read

jobs:
  validate-datalayer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout tracking governance repo
        uses: actions/checkout@v4
        with:
          repository: SimonAndreAsk/tracking
          ref: main
          path: tracking

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AJV
        run: npm install ajv@^8 ajv-formats@^3 --no-save

      - name: Validate dataLayer fixtures
        env:
          TRACKING_ROOT: ${{ github.workspace }}/tracking
        run: node scripts/validate-datalayer.mjs
